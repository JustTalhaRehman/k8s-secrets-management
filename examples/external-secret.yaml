# Example: sync a secret from AWS Secrets Manager into a Kubernetes Secret.
#
# Before applying this:
# 1. Create the secret in AWS:
#    aws secretsmanager create-secret \
#      --name myapp/database \
#      --secret-string '{"password":"your-db-password","username":"myapp"}'
#
# 2. Apply this ExternalSecret to your cluster:
#    kubectl apply -f examples/external-secret.yaml

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: myapp-database
  namespace: myapp
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: myapp-database-secret
    creationPolicy: Owner

  data:
    - secretKey: password
      remoteRef:
        key: myapp/database
        property: password

    - secretKey: username
      remoteRef:
        key: myapp/database
        property: username
