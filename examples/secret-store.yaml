# Example: Namespace-scoped SecretStore for AWS Secrets Manager
#
# Use this when you want to limit secret access to a specific namespace
# instead of using the cluster-wide ClusterSecretStore.
#
# This SecretStore will:
# - Only be accessible in the 'myapp' namespace
# - Use the same IRSA service account as the ClusterSecretStore
# - Provide the same AWS Secrets Manager access but with namespace isolation

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: myapp
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
